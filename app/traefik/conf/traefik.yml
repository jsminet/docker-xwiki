################################################################
# API and dashboard configuration
################################################################
api:
  # Dashboard
  dashboard: true
  insecure: true
################################################################
# Docker configuration backend
################################################################
providers:
  docker:
    exposedByDefault: false
    watch: true
################################################################
# Traefik Logging
################################################################
log:
  level: INFO
################################################################
# Entrypoint
################################################################
entryPoints:
  web:
    address: :80
  websecure:
    address: :443
  mariadb:
    address: :3306